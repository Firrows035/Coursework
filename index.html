<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <link rel="icon" type="image/jpg" href="image/character/Lagrange.jpg">
        <title>Game</title>
        <style>
            #Container{
                position: relative;
                margin: 5px;
                width: 95%;
                max-width: 1600px;
            }
            #mainCanvas{
                width:100%;
                object-fit: contain;
            }
            .choice{
                position: absolute; 
                top: 100px; 
                font-size: 20px; 
                width: 300px; 
                height: 450px;
                border: 1px solid black; 
                margin: 0px; 
                padding: 0px;
                text-align: center;
                background-color: white;
                align-items: center;
                justify-content: center;
            }
            #info{
                position: absolute;
                top:250px;
                left: 1080px;
                font-size: 20px;
                width: 500px;
                height: 600px;
                border: 1px solid black;
                margin: 0px;
                padding: 0px;
                text-align: center;
                background-color: white;
                align-items: center;
                justify-content: center;
            }
        </style>
    </head>
    <script src="common.js"></script>
    <script src="draw.js"></script>
    <script src="action.js"></script>
    <script src="battle.js"></script>
    <script src="main.js"></script>
    <script src="cheat.js"></script>
    <script src="choice.js"></script>
    <script src="loading.js"></script>
    <script src="effects.js"></script>
    <script src="map.js"></script>
    <script src="blockFeature.js"></script>
    <script>
        window.onload=function(){
            info=document.getElementById("extra");
            canvas=document.getElementById("mainCanvas");
            context=canvas.getContext("2d");
            choiceSet=Array.from(document.getElementsByClassName(`choice`));
            // canvas.addEventListener("keypress",e=>{ 
                

                
            // })
            canvas.addEventListener("click",e=>{
                console.log(e.offsetX+','+e.offsetY);
            })
            info.appendChild(document.createTextNode(seed));
            rect=canvas.getBoundingClientRect();
            scaleX=canvas.width/rect.width;
            scaleY=canvas.height/rect.height;
            preset();
            frontPage();
        }
    </script>
    <body style="padding: 0px; margin: 0px; margin-top:  2px;">
        <h1>A simple turn-based game</h1>

        <div id="Container">
            <canvas id="mainCanvas" width="1600px" height="900px" style="display: block; margin: 0px; padding: 0px; outline:none; border: 3px solid palegreen;" tabindex="999" onclick="Click(event)" onmousemove="onMouseMove(event)" onkeypress="keyPress(event)">
                
            </canvas>

            <div class="choice" id="choice1" style="left: 40px; display: none;" onclick="choose(c1)">

            </div>

            <div class="choice" id="choice2" style="left: 360px; display: none;" onclick="choose(c2)">

            </div>

            <div class="choice" id="choice3" style="left: 680px; display: none;" onclick="choose(c3)">
                
            </div>

            <div id="info">
                <p style="position: absolute; top:400px; left:20px; width: 460px; height: 180px; border: 1px solid black; margin: 0px; padding: 0px;"></p>
            </div>
        </div>
        
        <div id="extra"></div>
        <p>This game works best on screen no smaller than 1600x900.</p>
        <p>A keyboard & a mouse is needed.</p>
        <div>

        </div>
    </body>
    
</html>
